name: Update pool-fill radar

on:
  schedule:
    - cron: "7,22,37,52 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: cca-radar-tracker/requirements.txt

      - name: Install tracker dependencies
        run: pip install -r cca-radar-tracker/requirements.txt

      - name: Restore previously published tracker state
        continue-on-error: true
        env:
          STATUS_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/data/status.json
        run: curl --fail --silent --show-error --location --max-time 20 "$STATUS_URL" --output cca-radar-tracker/docs/data/status.json

      - name: Analyze new radar frames
        working-directory: cca-radar-tracker
        run: python tracker.py

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload website
        uses: actions/upload-pages-artifact@v3
        with:
          path: cca-radar-tracker/docs

      - name: Publish website
        id: deployment
        uses: actions/deploy-pages@v4
