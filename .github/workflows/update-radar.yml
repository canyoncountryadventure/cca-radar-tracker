name: Update pool-fill radar

on:
  schedule:
    - cron: "7,22,37,52 * * * *"
  workflow_dispatch:
    inputs:
      send_test_email:
        description: Send a test email even when there is no storm
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: cca-radar-tracker/requirements.txt

      - name: Install tracker dependencies
        run: pip install -r cca-radar-tracker/requirements.txt

      - name: Stage authoritative watershed polygons
        run: |
          python - <<'PY'
          import json
          import shutil
          from pathlib import Path

          source = Path("cca-radar-tracker/watersheds.geojson")
          destination = Path("cca-radar-tracker/docs/watersheds.geojson")

          if not source.exists():
              raise SystemExit(f"Authoritative watershed file is missing: {source}")

          collection = json.loads(source.read_text(encoding="utf-8"))
          features = collection.get("features", [])
          ids = {
              str(feature.get("properties", {}).get("id", ""))
              for feature in features
          }

          if collection.get("type") != "FeatureCollection":
              raise SystemExit("watersheds.geojson is not a GeoJSON FeatureCollection")
          if len(features) != 17:
              raise SystemExit(
                  f"Expected 17 watershed polygons, found {len(features)}"
              )
          if "" in ids or len(ids) != 17:
              raise SystemExit(
                  "Every watershed must have one unique nonblank properties.id value"
              )

          destination.parent.mkdir(parents=True, exist_ok=True)
          shutil.copyfile(source, destination)
          print(
              f"Staged {len(features)} watershed polygons at {destination} "
              f"({destination.stat().st_size:,} bytes)"
          )
          PY

      - name: Run backend tests
        working-directory: cca-radar-tracker
        run: python -m unittest discover -s tests -v

      - name: Check front-end JavaScript
        run: node --check cca-radar-tracker/docs/app.js

      - name: Reject stale source wording
        run: |
          # Check authored source only. Do not scan docs/data/*.json here because
          # those generated files are intentionally replaced by tracker.py later.
          if grep -niE "watershed .* area scale|target as 1-hour flow|delivered runoff|little to no expected change in pool depth|scaled intensity gates" \
            cca-radar-tracker/docs/app.js \
            cca-radar-tracker/docs/index.html \
            cca-radar-tracker/README.md; then
            echo "Stale area-scaled or fixed-coefficient wording remains in an authored source file."
            exit 1
          fi

      - name: Restore previously published tracker state
        continue-on-error: true
        env:
          STATUS_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/data/status.json
        run: |
          curl --fail --silent --show-error --location --max-time 20 \
            "$STATUS_URL" \
            --output cca-radar-tracker/docs/data/status.json

      - name: Analyze new radar frames
        working-directory: cca-radar-tracker
        run: python tracker.py

      - name: Verify revised refill model
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path("cca-radar-tracker/docs/data/model.json")
          model = json.loads(path.read_text(encoding="utf-8"))

          expected_formula = (
              "Fill target = 52,442 ft³ × (technical-section length ÷ 0.75 mi) "
              "× (1 + canyon pothole modifier)"
          )
          actual_formula = model["method"]["target_formula"]
          if actual_formula != expected_formula:
              raise SystemExit(
                  "Wrong target formula generated.\n"
                  f"Expected: {expected_formula}\n"
                  f"Actual:   {actual_formula}"
              )

          expected_targets = {
              "zerog": 52442,
              "angel-cove": 34087,
              "black-hole-white-canyon": 262210,
              "entrajo": 17830,
              "hog-canyons": 34087,
              "leprechaun": 6992,
              "no-kidding": 28528,
              "pool-arch": 1748,
              "alcatraz": 54540,
              "cable-canyon": 262210,
              "constrychnine": 20977,
              "eardley": 87403,
              "north-fork-iron-wash": 52442,
              "poe": 90899,
              "the-squeeze": 152956,
              "upper-greasewood": 83907,
              "woody": 17481,
          }
          for canyon_id, expected in expected_targets.items():
              actual = model["canyons"][canyon_id]["fill_target_ft3"]
              if actual != expected:
                  raise SystemExit(
                      f"{canyon_id} target is {actual}; expected {expected}"
                  )

          zerog = model["canyons"]["zerog"]
          expected_zero_g = {
              "fill_target_ft3": 52442,
              "storage_target_ft3": 52442,
              "flush_target_ft3": 104884,
              "technical_length_miles": 0.75,
              "pothole_modifier": 0.0,
          }
          errors = {
              key: {"expected": value, "actual": zerog.get(key)}
              for key, value in expected_zero_g.items()
              if zerog.get(key) != value
          }
          if errors:
              raise SystemExit(f"Zero G verification failed: {errors}")

          for canyon_id, canyon in model["canyons"].items():
              stale = {"scale_factor", "runoff_coefficient"}.intersection(canyon)
              if stale:
                  raise SystemExit(
                      f"{canyon_id} still contains obsolete fields: {sorted(stale)}"
                  )

          explanation = model["method"].get("direct_runoff_explanation", "")
          if "No fixed runoff coefficient is used" not in explanation:
              raise SystemExit("Direct-runoff method text was not updated")
          if "runoff_coefficient_explanation" in model["method"]:
              raise SystemExit("Obsolete runoff_coefficient_explanation remains in model metadata")

          config = json.loads(Path("cca-radar-tracker/config.json").read_text(encoding="utf-8"))
          obsolete_config = {
              "runoff_coefficient",
              "reference_area_sq_mi",
              "reference_fill_volume_ft3",
              "area_exponent",
              "reference_spatial_rules",
          }.intersection(config["model"])
          if obsolete_config:
              raise SystemExit(f"Obsolete config keys remain: {sorted(obsolete_config)}")

          watershed_path = Path("cca-radar-tracker/docs/watersheds.geojson")
          if not watershed_path.exists():
              raise SystemExit("Website watershed polygons were not staged")

          watershed_collection = json.loads(
              watershed_path.read_text(encoding="utf-8")
          )
          watershed_ids = {
              str(feature.get("properties", {}).get("id", ""))
              for feature in watershed_collection.get("features", [])
          }
          model_ids = set(model["canyons"])
          if watershed_ids != model_ids:
              raise SystemExit(
                  "Website polygon IDs do not match model canyon IDs. "
                  f"Missing polygons: {sorted(model_ids - watershed_ids)}; "
                  f"extra polygons: {sorted(watershed_ids - model_ids)}"
              )

          print(
              "Verified revised pool-refill model, all 17 watershed polygons, "
              "and the front-end data contract."
          )
          PY

      - name: Commit generated website reference data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add             cca-radar-tracker/docs/data/model.json             cca-radar-tracker/docs/watersheds.geojson

          if git diff --cached --quiet; then
            echo "Website model and watershed polygons are already current."
          else
            git commit -m "Update canyon model and watershed polygons"
            git push
          fi

      - name: Send email when a new major refill event qualifies
        working-directory: cca-radar-tracker
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          SMTP_USERNAME: canyoncountryadventure@gmail.com
          ALERT_TO: canyoncountryadventure@gmail.com
          SEND_TEST_EMAIL: ${{ inputs.send_test_email }}
        run: |
          if [[ "$SEND_TEST_EMAIL" == "true" ]]; then
            python send_alert.py --test
          else
            python send_alert.py
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload website
        uses: actions/upload-pages-artifact@v5
        with:
          path: cca-radar-tracker/docs

      - name: Publish website
        id: deployment
        uses: actions/deploy-pages@v5
